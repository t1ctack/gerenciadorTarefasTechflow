# .github/workflows/ci.yml
# -------------------------
# Pipeline de Integracao Continua (CI) com GitHub Actions.
# Executado automaticamente a cada push ou pull request para a branch principal.
#
# O pipeline:
#   1. Prepara o ambiente Python
#   2. Instala as dependencias
#   3. Roda a verificacao de qualidade do codigo (lint com flake8)
#   4. Executa todos os testes automatizados (pytest)

name: CI - Testes e Qualidade

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  testes:
    name: Testes automatizados e lint
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Verificar qualidade do codigo (lint)
        run: |
          # Falha apenas em erros graves (sintaxe / nomes indefinidos).
          flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
          # Avisos de estilo nao quebram o build (apenas relatorio).
          flake8 src tests --count --exit-zero --max-line-length=100 --statistics

      - name: Executar testes automatizados
        run: pytest -v
